# docker-compose.yml for the create-hermes-workspace.
#
# Usage:
#   cp .env.example .env  &&  $EDITOR .env
#   docker compose up -d
#   docker compose exec hermes bash
#
# This is a thin wrapper over the nousresearch/hermes-agent image. The
# workspace (./) is mounted as /opt/data so:
#   - any file the agent creates inside the container is visible on the host
#   - the host directory's git repo is the same one the agent sees
#   - you can edit files in your editor of choice while the agent runs
#
# Cross-OS port mapping (Linux, macOS, Windows + Docker Desktop):
#   - The dashboard listens on port 9119 inside the container (see
#     /opt/hermes/docker/s6-rc.d/dashboard/run in the base image). We map
#     it to the host via `ports:` so it works on every OS.
#   - DO NOT use `network_mode: host` here: it works on Linux but Docker
#     Desktop on mac/Windows uses a VM with isolated networking, so host
#     mode silently breaks the dashboard on those platforms.
#   - The application port (PORT, default 3000) is also mapped so apps
#     spawned inside the workspace (via `make new-project`) are reachable
#     from the host browser.

services:
  hermes:
    build: .
    image: hermes-workspace:local
    container_name: hermes-workspace
    restart: unless-stopped
    ports:
      # Dashboard (s6 service, listens on HERMES_DASHBOARD_PORT inside the
      # container; default 9119 — see base image s6-rc.d/dashboard/run).
      - "${DASHBOARD_PORT:-9119}:${DASHBOARD_PORT:-9119}"
      # User app port (the apps you create with `make new-project` listen
      # here). The base image's main-hermes wrapper uses PORT for nothing
      # by default; this mapping is for the apps you run inside the
      # workspace.
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Mount the workspace as the agent's data directory. Files created by
      # the agent appear here on the host. Change this if you want the agent
      # to operate on a different folder.
      - ./:/opt/data

    environment:
      # ---- Container user (so files on the host stay owned by you) --------
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}

      # ---- LLM provider keys (set at least ONE) ----------------------------
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}

      # ---- GitHub integration (used by `make worktree-push`) --------------
      - GITHUB_USER=${GITHUB_USER:-}

      # ---- Optional: application port and base URL ------------------------
      - PORT=${PORT:-3000}
      - APP_URL=${APP_URL:-http://localhost:3000}

      # ---- Hermes dashboard (the web UI on :$DASHBOARD_PORT) --------------
      # HERMES_DASHBOARD=1 activates the dashboard s6 service. Without it,
      # the service exits 0 and s6 reports the slot as down (see
      # /opt/hermes/docker/s6-rc.d/dashboard/run in the base image).
      # HERMES_DASHBOARD_INSECURE=1 disables the OAuth gate so the
      # dashboard is usable on a trusted LAN without a provider registered.
      # Set to 0 in production behind a reverse proxy with proper auth.
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_DASHBOARD_HOST=${HERMES_DASHBOARD_HOST:-0.0.0.0}
      - HERMES_DASHBOARD_PORT=${DASHBOARD_PORT:-9119}

      # ---- Optional: gateway integrations (uncomment + fill to enable) ----
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}

      # ---- Optional: log level ---------------------------------------------
      - LOG_LEVEL=${LOG_LEVEL:-info}

    # Health check pings the dashboard. NOTE: the dashboard listens on
    # DASHBOARD_PORT (default 9119), NOT on PORT (which is the user app
    # port). Pointing this at PORT was a latent bug that made the
    # healthcheck always fail on a stock workspace.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${DASHBOARD_PORT:-9119}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
